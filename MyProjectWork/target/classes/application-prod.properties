# =============================================================================
# Production profile — activate with `--spring.profiles.active=prod`
# (or set SPRING_PROFILES_ACTIVE=prod).
#
# This file overrides selected values from application.properties for prod.
# Sensitive secrets (DB password, JWT secret) are still loaded from environment
# variables — never commit them here.
#
# Required env vars in production:
#   DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET, CORS_ALLOWED_ORIGINS
# =============================================================================

# Production should never run Hibernate auto-DDL. Run schema migrations
# (Flyway/Liquibase or manual SQL) out-of-band.
spring.jpa.hibernate.ddl-auto=validate

# Silence SQL logging in prod to reduce log noise / cost.
spring.jpa.show-sql=false

# Tighten upload limits in prod if your hosting plan has constraints.
# (Override via MAX_FILE_SIZE / MAX_REQUEST_SIZE env vars as needed.)
