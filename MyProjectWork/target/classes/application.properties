spring.application.name=restdemo1

# =============================================================================
# Environment-driven configuration
# =============================================================================
# Every value below uses `${ENV_VAR:dev-default}` so production deploys can
# override anything via environment variables (or `-Dapp.x=...` JVM flags)
# WITHOUT modifying this file. Defaults remain safe for local development.
#
# See `.env.example` at the project root for the full list of supported
# environment variables.
# =============================================================================

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/demodb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8086}

# ─── File uploads (profile photos) ───────────────────────────────────────────
file.upload-dir=${FILE_UPLOAD_DIR:./candidate_profile}

# ─── JWT Authentication ──────────────────────────────────────────────────────
# IMPORTANT: ALWAYS override JWT_SECRET in production with a strong random string.
# Generate a 64+ char secret: `openssl rand -base64 64`
app.jwt.secret=${JWT_SECRET:GenCDossierSuperSecretKeyForJWTAuthenticationThatIsLongEnough2024}
# Token expiry in milliseconds (default: 24h = 86400000)
app.jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# ─── CORS ────────────────────────────────────────────────────────────────────
# Comma-separated list of frontend origins allowed to call this API.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# ─── Pagination ──────────────────────────────────────────────────────────────
app.pagination.page-size=${APP_PAGE_SIZE:10}

# ─── Multipart upload limits ─────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:20MB}

# ─── Swagger / OpenAPI ───────────────────────────────────────────────────────
# UI:    http://localhost:${server.port}/swagger-ui.html
# JSON:  http://localhost:${server.port}/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.persist-authorization=true
# Set to `false` to disable Swagger in production builds:
#   SPRINGDOC_API_DOCS_ENABLED=false  &  SPRINGDOC_SWAGGER_UI_ENABLED=false
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_SWAGGER_UI_ENABLED:true}

# ─── Hibernate tuning (static — no env overrides needed) ─────────────────────
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true

# Disable Hibernate's auto bean-validation on persist/update.
# Validation is still enforced at controller layer via @Valid;
# this prevents cascade saves from re-validating pre-existing entity data
# (e.g. older Achievements/Certifications that pre-date the new @NotNull rules)
# and silently rolling back legitimate merges (like Excel finalScore updates).
spring.jpa.properties.jakarta.persistence.validation.mode=none
